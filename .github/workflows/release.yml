# Release workflow — fires on every annotated/lightweight tag matching
# `v*` and produces .deb / .rpm / tarball artifacts via goreleaser.
#
# Tag → branch policy (enforced by the `validate` job):
#
#   vA.B.C        stable          — tagged commit must be reachable from main
#   vA.B.C-rcN    release cand.   — tagged commit must be reachable from validation
#   vA.B.C-betaN  beta            — tagged commit must be reachable from develop
#
# The hyphen before rc/beta is required: it makes the tag valid semver
# (1.2.3-rc1), which is what goreleaser's parser expects. Goreleaser's
# `prerelease: auto` then flags rc/beta tags as GitHub pre-releases.
#
# Any other tag pattern is rejected by the trigger filter.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta[0-9]+'

permissions:
  contents: write   # required to create / edit the GitHub Release

jobs:
  validate:
    name: Validate tag → branch policy
    runs-on: ubuntu-latest
    outputs:
      kind: ${{ steps.classify.outputs.kind }}
      version: ${{ steps.classify.outputs.version }}
    steps:
      - name: Checkout (full history, all branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We need every branch ref locally to run `git merge-base
          # --is-ancestor`, so disable the shallow / single-branch default.

      - name: Classify the tag
        id: classify
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          echo "tag=${tag}"

          if   [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            kind=stable
            required_branch=main
          elif [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            kind=rc
            required_branch=validation
          elif [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta[0-9]+$ ]]; then
            kind=beta
            required_branch=develop
          else
            echo "::error::Tag '${tag}' does not match vA.B.C, vA.B.C-rcN, or vA.B.C-betaN."
            exit 1
          fi

          echo "kind=${kind}"             >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}"         >> "$GITHUB_OUTPUT"
          echo "required_branch=${required_branch}" >> "$GITHUB_ENV"

      - name: Verify tagged commit is on the required branch
        run: |
          set -euo pipefail
          branch="${required_branch}"
          ref="refs/remotes/origin/${branch}"

          if ! git show-ref --verify --quiet "${ref}"; then
            echo "::error::Branch '${branch}' does not exist on origin — cannot validate tag ancestry."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "${ref}"; then
            echo "::error::Tag '${GITHUB_REF_NAME}' points at commit ${GITHUB_SHA}, which is not reachable from origin/${branch}."
            echo "::error::Policy: stable tags must live on main, rc tags on validation, beta tags on develop."
            exit 1
          fi

          echo "OK: ${GITHUB_REF_NAME} (${GITHUB_SHA:0:7}) is reachable from origin/${branch}."

  release:
    name: Build & publish (${{ needs.validate.outputs.kind }})
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Non-blocking: goreleaser deprecated the `brews` property (it now nudges
      # toward `homebrew_casks`), so `check` exits non-zero on that deprecation
      # warning alone. The formula is kept deliberately — a cask can't inject
      # the runtime env the binaries need to locate yoke's non-embedded config,
      # nor run a `brew services` daemon (see packaging/README.md). Keep an eye
      # on this step's log for any OTHER (real) config error.
      - name: Validate goreleaser config
        continue-on-error: true
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: check

      - name: Run goreleaser (build + publish)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to blouargant/homebrew-tap, required to push
          # the generated Formula/yoke.rb. Add it as a repo/org secret. Without
          # it, goreleaser fails only the brew publish, not the GitHub release.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Job summary
        run: |
          {
            echo "## Release ${GITHUB_REF_NAME}"
            echo ""
            echo "- Kind: **${{ needs.validate.outputs.kind }}**"
            echo "- Version: \`${{ needs.validate.outputs.version }}\`"
            echo "- Commit: \`${GITHUB_SHA:0:12}\`"
            echo ""
            echo "Artifacts published to the GitHub Release page."
          } >> "$GITHUB_STEP_SUMMARY"

  # Build the per-platform pip wheels (yoke-agent) and publish to PyPI. The Go
  # binaries are static (CGO_ENABLED=0), so all platform wheels cross-compile on
  # one Linux runner — no per-OS matrix. rc/beta tags publish as PEP 440
  # pre-releases (pip ignores them by default), matching goreleaser's
  # `prerelease: auto`. Requires a PYPI_API_TOKEN repo secret.
  pypi:
    name: Build & publish pip wheels (PyPI)
    needs: [validate, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade build wheel setuptools twine

      - name: Build wheels
        run: make wheels VERSION="${GITHUB_REF_NAME}"

      - name: Check wheel metadata
        run: twine check dist/wheels/*.whl

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive --skip-existing dist/wheels/*.whl

  # Build the Windows MSI from the Windows .zip goreleaser just published, then
  # attach it to the same GitHub Release. goreleaser OSS can't build MSI, and
  # WiX needs a Windows host — so this runs on windows-latest after `release`.
  # Stable tags only: MSI ProductVersion is strictly numeric (x.y.z.0) and can't
  # carry an -rcN/-betaN suffix, matching the brew formula's stable-only publish.
  msi:
    name: Build Windows MSI (x64)
    needs: [validate, release]
    if: needs.validate.outputs.kind == 'stable'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download the Windows archive from the release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$env:GITHUB_REF_NAME" --repo "$env:GITHUB_REPOSITORY" --pattern "*Windows_x86_64.zip" --dir "$env:RUNNER_TEMP\zip"

      - name: Stage files into the install / data layout
        shell: pwsh
        run: |
          $zip = Get-ChildItem "$env:RUNNER_TEMP\zip\*Windows_x86_64.zip" | Select-Object -First 1
          $ex  = "$env:RUNNER_TEMP\extract"
          Expand-Archive -Path $zip.FullName -DestinationPath $ex -Force
          $stage = "$env:RUNNER_TEMP\stage"
          New-Item -ItemType Directory -Force -Path "$stage\install\web","$stage\data" | Out-Null
          # Binaries + static web UI -> Program Files\Yoke
          Copy-Item "$ex\yoke.exe","$ex\yoke-server.exe" "$stage\install\"
          Copy-Item "$ex\web\*" "$stage\install\web\" -Recurse
          # System config layer -> ProgramData\Yoke (flatten config\, keep filters\ + registry\)
          Copy-Item "$ex\config\*.json" "$stage\data\"
          Copy-Item "$ex\config\server.yaml" "$stage\data\"
          Copy-Item "$ex\config\filters" "$stage\data\filters" -Recurse
          Copy-Item "$ex\registry" "$stage\data\registry" -Recurse
          "STAGE=$stage" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build MSI
        shell: pwsh
        run: |
          $ver = "${{ needs.validate.outputs.version }}"
          $out = "$env:RUNNER_TEMP\yoke_${ver}_windows_x86_64.msi"
          wix build packaging\windows\yoke.wxs -arch x64 -d Version="$ver.0" -d StageDir="$env:STAGE" -o "$out"
          "MSI=$out" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload MSI to the release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$env:GITHUB_REF_NAME" "$env:MSI" --repo "$env:GITHUB_REPOSITORY" --clobber
