agents:
    - description: Generic coordinator agent.
      model_ref: premium
      name: leader
      skills_dir: skills/leader
      tools:
        - fs
        - mcp
        - skills
        - softskills
        - calc
    - allow_file_attachments: true
      description: Gathers evidence with read-only tools (file reads, log inspection, MCP queries) and reports findings.
      enabled: true
      mailbox: true
      model_ref: hosted
      name: investigator
      skills_dir: skills/investigator
      tools:
        - fs
        - mcp
        - skills
        - softskills
        - calc
    - description: Searches the web and fetches page content to answer research questions.
      enabled: true
      mailbox: true
      model_ref: balanced
      name: web_agent
      skills_dir: skills/web_agent
      tools:
        - serpapi
        - ddg
        - web
        - skills
        - softskills
    - description: Condenses long content into a structured brief.
      enabled: true
      mailbox: true
      model_ref: balanced
      name: summariser
      tools: []
    - description: Post-session soft-skill curator.
      enabled: true
      mailbox: false
      model_ref: balanced
      name: curator
app_name: agent-toolkit
bash_output_filters_dir: config/filters
bash_timeout_seconds: 120
mcp_config_path: config/mcp_config.yaml
models:
    balanced:
        api_key: OPENAI_API_KEY
        base_url: OPENAI_BASE_URL
        context_length: 128000
        input_token_price_per_million: 0.42
        model: gpt-4.1-mini-sweden
        output_token_price_per_million: 1.68
        provider: openai_compat
    hosted:
        api_key: OPENAI_API_KEY
        base_url: OPENAI_BASE_URL
        context_length: 128000
        input_token_price_per_million: 0.6
        model: test
        output_token_price_per_million: 3.6
        provider: openai_compat
    premium:
        api_key: OPENAI_API_KEY
        base_url: OPENAI_BASE_URL
        context_length: 200000
        input_token_price_per_million: 5
        model: claude-sonnet-4-6
        output_token_price_per_million: 26
        provider: openai_compat
    simple:
        api_key: OPENAI_API_KEY
        base_url: OPENAI_BASE_URL
        context_length: 128000
        input_token_price_per_million: 0.17
        model: gpt-4o-mini-sweden
        output_token_price_per_million: 0.69
        provider: openai_compat
permissions_config_path: config/permissions.yaml
softskills_dir: softskills
token_optimization: true
