<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yoke</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <script>
    // Apply the persisted theme synchronously before stylesheets resolve,
    // so the page never flashes the default palette when a different theme
    // is selected. Settings.js writes to this same localStorage key.
    (function () {
      try {
        var t = localStorage.getItem("agent_toolkit_theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (_) { /* ignore */ }
    })();
  </script>
  <link rel="stylesheet" href="assets/css/styles.css?v=4" />
  <link rel="stylesheet" href="assets/css/settings.css?v=4" />
  <link rel="stylesheet" href="assets/css/themes/github-dark.css" />
  <link rel="stylesheet" href="assets/css/themes/one-dark.css" />
  <link rel="stylesheet" href="assets/css/themes/vscode-light.css" />
  <link rel="stylesheet" href="assets/css/themes/github-light.css" />
  <link rel="stylesheet" href="assets/css/themes/dracula.css" />
  <link rel="stylesheet" href="assets/css/themes/nord.css" />
  <link rel="stylesheet" href="assets/css/themes/tokyo-night.css" />
  <link rel="stylesheet" href="assets/css/themes/solarized-dark.css" />
  <link rel="stylesheet" href="assets/css/themes/monokai.css" />
  <link rel="stylesheet" href="assets/css/themes/gruvbox-dark.css" />
  <link rel="stylesheet" href="assets/css/themes/solarized-light.css" />
  <link rel="stylesheet" href="assets/css/themes/subtle-grey.css" />
  <script src="assets/marked.min.js"></script>
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="app-name">Yoke</span>
      <div class="sidebar-header-btns">
        <button id="sidebar-toggle" type="button" data-tip="Hide sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
    </div>
    <div id="new-chat-wrap">
      <button id="new-chat" type="button" data-tip="New chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        <span class="new-chat-text">
          <span class="new-chat-label">New Chat</span>
          <span class="new-chat-sub" hidden></span>
        </span>
      </button>
      <button id="squad-toggle" type="button" data-tip="Choose squad" aria-haspopup="true" aria-expanded="false" hidden>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div id="squad-menu" role="menu" hidden></div>
    </div>
    <div class="sidebar-section-label">Sessions</div>
    <ul id="session-list" aria-label="sessions"></ul>
    <div id="archived-panel" class="collapsed" hidden>
      <div id="archived-header" role="button" tabindex="0" aria-expanded="false" data-tip="Toggle archived sessions">
        <svg class="archived-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="sidebar-section-label">Archived</span>
        <span id="archived-count" class="archived-count"></span>
      </div>
      <ul id="archived-list" aria-label="archived sessions"></ul>
    </div>
    <div id="settings-menu" hidden>
      <div class="sidebar-section-label">Settings</div>
      <ul id="settings-menu-list" aria-label="settings sections"></ul>
    </div>
    <div id="sidebar-footer">
      <button id="settings-btn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </button>
    </div>
  </aside>
  <div id="sidebar-resize" aria-hidden="true"></div>

  <main id="chat">
    <div id="prompt-header"></div>
    <div id="transcript" aria-live="polite"></div>
    <div id="ask-user-slot"></div>
    <div id="composer-wrap">
      <div id="composer-resize" aria-hidden="true"></div>
      <div id="slash-menu" hidden></div>
      <form id="composer">
        <input type="file" id="file-input" multiple hidden />
        <div id="attachments" hidden></div>
        <textarea id="prompt" rows="3" placeholder="Message the agent… (Enter to send)"></textarea>
        <div class="composer-actions">
          <div id="attach-wrap">
            <button id="attach-btn" type="button" data-tip="Attach files">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <div id="attach-menu" hidden>
              <button id="attach-computer" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                Upload from computer
              </button>
              <button id="attach-context" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                Add context
              </button>
            </div>
          </div>
          <button id="edit-mode-btn" type="button" data-tip="Toggle Enter key: send vs new line">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7V4h16v3"/>
              <path d="M9 20h6"/>
              <path d="M12 4v16"/>
            </svg>
          </button>
          <button id="slash-btn" type="button" data-tip="Slash commands (/)">/</button>
          <span id="ctx-ring-wrap">
            <svg id="ctx-ring-svg" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
              <circle class="ctx-ring-track" cx="12" cy="12" r="9" fill="none" stroke-width="2.5"/>
              <circle class="ctx-ring-fill" cx="12" cy="12" r="9" fill="none" stroke-width="2.5"
                stroke-linecap="round" transform="rotate(-90 12 12)"/>
            </svg>
            <div id="ctx-popup" hidden>
              <div class="ctx-popup-header">Context</div>
              <div class="ctx-popup-grid">
                <span>Tokens used</span>  <span id="ctx-pop-used">—</span>
                <span>Max context</span>  <span id="ctx-pop-max">—</span>
                <span>Percent</span>      <span id="ctx-pop-pct">—</span>
                <span>Budget</span>       <span id="ctx-pop-budget">—</span>
              </div>
              <div id="ctx-pop-agents" hidden></div>
              <button id="ctx-compact-btn" type="button">Compress Now</button>
            </div>
          </span>
          <span id="status"></span>
          <button id="cancel" type="button" disabled>Stop</button>
          <button id="send" type="submit">Send</button>
        </div>
      </form>
    </div>
  </main>

  <div id="ctx-browser-overlay" hidden>
    <div id="ctx-browser">
      <div id="ctx-browser-header">
        <span class="ctx-browser-title">Add Context</span>
        <button id="ctx-browser-close" type="button" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="ctx-browser-nav">
        <span id="ctx-browser-path"></span>
      </div>
      <div id="ctx-browser-list-wrap">
        <ul id="ctx-browser-list"></ul>
      </div>
      <div id="ctx-browser-footer">
        <span id="ctx-browser-count">No files selected</span>
        <div class="ctx-browser-footer-btns">
          <button id="ctx-browser-cancel" type="button">Cancel</button>
          <button id="ctx-browser-add" type="button" disabled>Add</button>
        </div>
      </div>
    </div>
  </div>

  <div id="user-cmd-modal-overlay" hidden>
    <div id="user-cmd-modal" role="dialog" aria-modal="true" aria-labelledby="user-cmd-modal-title">
      <div class="user-cmd-modal-header">
        <span id="user-cmd-modal-title">Add command</span>
        <button id="user-cmd-modal-close" type="button" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="user-cmd-modal-body">
        <label class="user-cmd-field">
          <span class="user-cmd-field-label">Name</span>
          <div class="user-cmd-name-row">
            <span class="user-cmd-name-prefix">/</span>
            <input id="user-cmd-name" type="text" maxlength="40" autocomplete="off" spellcheck="false" placeholder="review" />
          </div>
          <span class="user-cmd-field-hint">letters, digits, '-' or '_' (1–40 chars)</span>
        </label>
        <label class="user-cmd-field">
          <span class="user-cmd-field-label">Description</span>
          <input id="user-cmd-desc" type="text" maxlength="120" autocomplete="off" placeholder="Review the staged changes" />
        </label>
        <label class="user-cmd-field">
          <span class="user-cmd-field-label">Arguments hint <span class="user-cmd-field-optional">(optional)</span></span>
          <input id="user-cmd-args" type="text" maxlength="60" autocomplete="off" placeholder="[file]" />
          <span class="user-cmd-field-hint">shown next to the command name in the slash menu</span>
        </label>
        <label class="user-cmd-field">
          <span class="user-cmd-field-label">Prompt template</span>
          <textarea id="user-cmd-prompt" rows="6" spellcheck="false" placeholder="Review the staged changes carefully. Focus on $1 if provided."></textarea>
          <span class="user-cmd-field-hint">Use <code>$1</code>, <code>$2</code> … for positional args, <code>$*</code> for all args.</span>
        </label>
        <div id="user-cmd-error" class="user-cmd-error" hidden></div>
      </div>
      <div class="user-cmd-modal-footer">
        <button id="user-cmd-modal-cancel" type="button">Cancel</button>
        <button id="user-cmd-modal-save" type="button" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div id="skill-name-modal-overlay" hidden>
    <div id="skill-name-modal" role="dialog" aria-modal="true" aria-labelledby="skill-name-modal-title">
      <div class="user-cmd-modal-header">
        <span id="skill-name-modal-title">Create skill</span>
        <button id="skill-name-modal-close" type="button" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="user-cmd-modal-body">
        <label class="user-cmd-field">
          <span class="user-cmd-field-label">Skill name</span>
          <div class="user-cmd-name-row">
            <input id="skill-name-input" type="text" maxlength="63" autocomplete="off" spellcheck="false" placeholder="my-skill" />
          </div>
          <span class="user-cmd-field-hint">lowercase letters, digits, '-' or '.' (1–63 chars)</span>
        </label>
        <div id="skill-name-modal-error" class="user-cmd-error" hidden></div>
      </div>
      <div class="user-cmd-modal-footer">
        <button id="skill-name-modal-cancel" type="button">Cancel</button>
        <button id="skill-name-modal-start" type="button" class="primary">Start</button>
      </div>
    </div>
  </div>

  <script src="assets/app.js" defer></script>
  <script src="assets/settings.js?v=3" defer></script>
</body>
</html>
